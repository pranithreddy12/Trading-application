<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.5; padding: 20px; }
  .container { max-width: 1600px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; }
  header .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
  header .status-badge.ok { background: #0d4429; color: #3fb950; }
  header .status-badge.err { background: #441a1a; color: #f85149; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .card h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 12px; }
  .card .value { font-size: 28px; font-weight: 700; color: #e1e4e8; }
  .card .sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .card .bar { display: flex; gap: 4px; margin-top: 8px; }
  .card .bar .seg { height: 6px; border-radius: 3px; min-width: 2px; }
  .card .gauge { width: 100%; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .card .gauge .fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .card .gauge-label { display: flex; justify-content: space-between; font-size: 11px; color: #8b949e; margin-top: 4px; }
  .section-title { font-size: 16px; font-weight: 600; color: #e1e4e8; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #8b949e; font-weight: 600; border-bottom: 1px solid #30363d; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 8px 10px; border-bottom: 1px solid #21262d; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .chip.green { background: #0d4429; color: #3fb950; }
  .chip.yellow { background: #3d2e00; color: #d29922; }
  .chip.red { background: #441a1a; color: #f85149; }
  .chip.blue { background: #0c2d6b; color: #58a6ff; }
  .chip.gray { background: #21262d; color: #8b949e; }
  .flex { display: flex; gap: 12px; flex-wrap: wrap; }
  .flex-grow { flex: 1; min-width: 0; }
  .mt-8 { margin-top: 8px; }
  .mb-8 { margin-bottom: 8px; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .error-banner { background: #441a1a; border: 1px solid #f85149; border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; color: #f85149; font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; background: #21262d; color: #8b949e; margin-right: 4px; }
  .scroll-x { overflow-x: auto; }
  .last-updated { text-align: right; font-size: 12px; color: #484f58; padding: 4px 0; }
  .metric-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .metric { flex: 1; min-width: 100px; }
  .metric .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px; }
  .metric .val { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .clickable { cursor: pointer; transition: background 0.15s; }
  .clickable:hover { background: #1c2333; }
  .strategy-detail { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 4px; display: none; }
  .strategy-detail.open { display: block; }
  .val-pass { color: #3fb950; font-weight: 600; }
  .val-fail { color: #f85149; font-weight: 600; }
  .val-warn { color: #d29922; font-weight: 600; }
  .pnl-pos { color: #3fb950; }
  .pnl-neg { color: #f85149; }
  @media (max-width: 600px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1>ATLAS Operator Dashboard</h1>
    <div>
      <span class="status-badge" id="statusBadge">--</span>
      <span style="color:#484f58;font-size:12px;margin-left:12px" id="lastUpdate"></span>
    </div>
  </header>
  <div id="errors"></div>
  <div id="content" class="loading">Loading dashboard data...</div>
</div>
<script>
const API = '';
const FAST_REFRESH_MS = 10000;
const SLOW_REFRESH_MS = 45000;
let refreshTimer = null;
let slowRefreshTimer = null;

function statusChip(s) {
  if (!s) return '<span class="chip gray">unknown</span>';
  const lo = s.toLowerCase();
  if (lo.includes('completed') || lo.includes('pass') || lo.includes('healthy') || lo.includes('active') || lo.includes('filled') || lo.includes('validated') || lo.includes('buy') || lo.includes('sell')) return '<span class="chip green">'+s+'</span>';
  if (lo.includes('failed') || lo.includes('error') || lo.includes('unhealthy') || lo.includes('stale') || lo.includes('red')) return '<span class="chip red">'+s+'</span>';
  if (lo.includes('pending') || lo.includes('running') || lo.includes('skipped') || lo.includes('hold')) return '<span class="chip yellow">'+s+'</span>';
  return '<span class="chip blue">'+s+'</span>';
}

function scoreBar(v, max=100) {
  if (v === 0) return '<div class="val" style="color:#8b949e;font-size:11px">Insufficient sample size</div>';
  const pct = Math.min(Math.max((v/max)*100, 0), 100);
  const color = pct >= 70 ? '#3fb950' : (pct >= 40 ? '#d29922' : '#f85149');
  return '<div class="gauge"><div class="fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="gauge-label"><span>'+(typeof v==='number'?v.toFixed(1):v)+'</span><span>'+max+'</span></div>';
}

function loadingCard(message) {
  return '<div class="card"><div class="sub">'+(message || 'Loading...')+'</div></div>';
}

function setSectionHtml(sectionId, html) {
  const node = document.getElementById(sectionId);
  if (node) node.innerHTML = html;
}

function setSectionError(sectionId, message) {
  setSectionHtml(sectionId, '<div class="error-banner">'+esc(message)+'</div>');
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(url+' returned '+r.status);
  return r.json();
}

function touchLastUpdate() {
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

function renderOverview(data) {
  const { system, strategies, backtests, lineage, patterns, briefs, execution, auth, portfolio, validation, monitoring, scouts } = data;
  document.getElementById('statusBadge').className = 'status-badge '+(system&&system.status==='ok'?'ok':'err');
  document.getElementById('statusBadge').textContent = system ? system.status : 'UNKNOWN';

  const cards = [
    { label: 'Strategies', val: (strategies&&strategies.total)||0, sub: strategies&&strategies.by_status?Object.keys(strategies.by_status).length+' statuses':'--' },
    { label: 'Backtests', val: (backtests&&backtests.total)||0, sub: 'completed' },
    { label: 'Lineage Events', val: (lineage&&lineage.total_events)||0, sub: ((lineage&&lineage.total_traces)||0)+' traces' },
    { label: 'Patterns', val: (patterns&&patterns.total)||0, sub: 'extracted' },
    { label: 'Portfolio Intel', val: (portfolio&&portfolio.intel_runs)||0, sub: ((portfolio&&portfolio.allocations)||0)+' allocations' },
    { label: 'Validation', val: (validation?validation.walk_forward+validation.monte_carlo:0)||0, sub: 'walk-forward + MC' },
    { label: 'Drift Events', val: (monitoring&&monitoring.drift_events)||0, sub: 'monitoring scans' },
        { label: 'Scout Signals', val: (scouts&&scouts.internal_signals)||0, sub: 'internal intelligence' },
  ];

  let html = '<div class="grid">';
  for (const c of cards) {
    html += '<div class="card"><h3>'+c.label+'</h3><div class="value">'+c.val+'</div><div class="sub">'+c.sub+'</div></div>';
  }
  html += '</div>';

  if (strategies && strategies.by_status) {
    html += '<div class="card"><h3>Strategy Status Distribution</h3><div class="bar">';
    const entries = Object.entries(strategies.by_status);
    const total = entries.reduce((s, [,v]) => s+v, 0) || 1;
    const colors = ['#3fb950','#d29922','#f85149','#58a6ff','#8b949e','#bc8cff'];
    entries.forEach(([k,v], i) => {
      html += '<div class="seg" style="flex:'+v+';background:'+colors[i%colors.length]+'" title="'+k+': '+v+'"></div>';
    });
    html += '</div><div class="sub" style="margin-top:6px">';
    entries.forEach(([k,v], i) => {
      html += '<span style="display:inline-block;margin-right:12px;font-size:11px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+colors[i%colors.length]+';margin-right:4px"></span>'+k+': '+v+'</span>';
    });
    html += '</div></div>';
  }

  document.getElementById('overview').innerHTML = html;
}

function renderPipeline(data) {
  const { strategy_statuses, lifecycle_events, recent_strategies } = data;
  let html = '<div class="flex">';
  html += '<div class="card flex-grow"><h3>Strategy Statuses</h3>';
  if (strategy_statuses && Object.keys(strategy_statuses).length) {
    html += '<table><tr><th>Status</th><th class="text-right">Count</th></tr>';
    for (const [k,v] of Object.entries(strategy_statuses)) {
      html += '<tr><td>'+statusChip(k)+'</td><td class="text-right">'+v+'</td></tr>';
    }
    html += '</table>';
  } else {
    html += '<div class="sub">No strategies found</div>';
  }
  html += '</div>';

  html += '<div class="card flex-grow"><h3>Lifecycle Funnel</h3>';
  if (lifecycle_events && Object.keys(lifecycle_events).length) {
    html += '<table><tr><th>Stage</th><th class="text-right">Completed</th><th class="text-right">Failed</th></tr>';
    for (const [stage, statuses] of Object.entries(lifecycle_events)) {
      const ok = statuses['completed']||0;
      const fail = statuses['failed']||0;
      html += '<tr><td><span class="tag">'+esc(stage)+'</span></td><td class="text-right">'+ok+'</td><td class="text-right">'+fail+'</td></tr>';
    }
    html += '</table>';
  } else {
    html += '<div class="sub">No lifecycle data</div>';
  }
  html += '</div>';
  html += '</div>';

  html += '<div class="card mt-8"><h3>Recent Strategies <span style="font-weight:400;color:#8b949e;font-size:11px">(click to expand validation)</span></h3>';
  if (recent_strategies && recent_strategies.length) {
    html += '<div class="scroll-x"><table><tr><th>Name</th><th>Status</th><th>Author</th><th>Validation</th><th>Created</th></tr>';
    for (const s of recent_strategies) {
      html += '<tr class="clickable" onclick="toggleStrategyDetail(\''+esc(s.id)+'\')"><td><strong>'+esc(s.name||s.id.slice(0,8))+'</strong></td>'
        + '<td>'+statusChip(s.status)+'</td>'
        + '<td>'+(s.author||'--')+'</td>'
        + '<td id="val-badge-'+esc(s.id)+'"><span class="chip gray">loading...</span></td>'
        + '<td style="color:#8b949e;font-size:12px">'+fmtTime(s.created_at)+'</td></tr>'
        + '<tr id="strategy-detail-'+esc(s.id)+'" class="strategy-detail"><td colspan="5"><div id="strategy-detail-content-'+esc(s.id)+'">Loading...</div></td></tr>';
    }
    html += '</table></div>';
  } else {
    html += '<div class="sub">No recent strategies</div>';
  }
  html += '</div>';

  document.getElementById('pipeline').innerHTML = html;

  // Fetch validation badges for each strategy in background
  if (recent_strategies) {
    for (const s of recent_strategies) {
      if (s.id) fetchValidationBadge(s.id);
    }
  }
}

async function fetchValidationBadge(strategyId) {
  try {
    const data = await fetchJSON(API+'/dashboard/api/strategies/'+strategyId);
    const reasons = data.validation_reasons || [];
    const badge = document.getElementById('val-badge-'+strategyId);
    if (!badge) return;
    if (reasons.length === 0) {
      badge.innerHTML = '<span class="chip gray">no data</span>';
    } else {
      const passed = reasons.filter(r => r.passed).length;
      const failed = reasons.filter(r => !r.passed).length;
      if (failed === 0) {
        badge.innerHTML = '<span class="chip green">'+passed+'/'+reasons.length+' passed</span>';
      } else {
        badge.innerHTML = '<span class="chip yellow">'+passed+'/'+reasons.length+' passed ('+failed+' fail)</span>';
      }
    }
    // Populate cache so first click doesn't re-fetch
    if (!_detailCache[strategyId] && data.strategy) {
      let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
      // Left column: Backtest metrics
      html += '<div>';
      if (data.backtest) {
        const bt = data.backtest;
        html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin-bottom:6px">Backtest Results</h4>';
        html += '<div class="metric-row">';
        if (bt.sharpe != null) html += '<div class="metric"><div class="label">Sharpe</div><div class="val" style="font-size:14px;color:'+(bt.sharpe>=1?'#3fb950':'#d29922')+'">'+bt.sharpe.toFixed(2)+'</div></div>';
        if (bt.sortino != null) html += '<div class="metric"><div class="label">Sortino</div><div class="val" style="font-size:14px">'+bt.sortino.toFixed(2)+'</div></div>';
        if (bt.win_rate != null) html += '<div class="metric"><div class="label">Win Rate</div><div class="val" style="font-size:14px">'+(bt.win_rate*100).toFixed(0)+'%</div></div>';
        if (bt.total_trades != null) html += '<div class="metric"><div class="label">Total Trades</div><div class="val" style="font-size:14px">'+bt.total_trades+'</div></div>';
        if (bt.composite_fitness != null) html += '<div class="metric"><div class="label">Fitness</div>'+scoreBar(bt.composite_fitness*100,100)+'</div>';
        if (bt.expectancy != null) html += '<div class="metric"><div class="label">Expectancy</div><div class="val" style="font-size:14px;color:'+(bt.expectancy>=0?'#3fb950':'#f85149')+'">$'+bt.expectancy.toFixed(2)+'</div></div>';
        html += '</div>';
      } else {
        html += '<div class="sub">No backtest results</div>';
      }
      // Lifecycle events
      if (data.lifecycle_traces && data.lifecycle_traces.length) {
        html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin:8px 0 4px">Lifecycle</h4>';
        html += '<div style="font-size:12px;color:#8b949e">';
        for (const t of data.lifecycle_traces.slice(0,5)) {
          html += '<div>'+statusChip(t.stage)+' &rarr; '+statusChip(t.status)+' <span style="color:#484f58">'+fmtTime(t.created_at)+'</span></div>';
        }
        html += '</div>';
      }
      html += '</div>'; // end left
      // Right column: Validation reasons
      html += '<div>';
      html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin-bottom:6px">Validation Checks</h4>';
      if (data.validation_reasons && data.validation_reasons.length) {
        for (const v of data.validation_reasons) {
          const icon = v.passed ? '&#10003;' : '&#10007;';
          const cls = v.passed ? 'val-pass' : 'val-fail';
          html += '<div style="margin-bottom:8px;padding:6px 8px;background:#161b22;border-radius:4px;border-left:3px solid '+(v.passed?'#3fb950':'#f85149')+'">';
          html += '<span class="'+cls+'">'+icon+'</span> <strong style="font-size:12px">'+v.check+'</strong>';
          html += '<div style="font-size:11px;color:#8b949e;margin-top:2px">'+esc(v.detail)+'</div>';
          html += '</div>';
        }
      } else {
        html += '<div class="sub">No validation data</div>';
      }
      // Strategy meta
      if (data.strategy) {
        const s = data.strategy;
        html += '<div style="font-size:11px;color:#484f58;margin-top:8px">';
        html += 'Trace: <code style="color:#8b949e">'+(s.trace_id||'--').slice(0,16)+'</code>';
        if (s.mutation_type) html += ' &middot; Mutation: '+s.mutation_type;
        if (s.lifecycle_state) html += ' &middot; State: '+s.lifecycle_state;
        html += '</div>';
      }
      html += '</div>'; // end right
      html += '</div>'; // end grid
      _detailCache[strategyId] = html;
    }
  } catch(e) {
    const badge = document.getElementById('val-badge-'+strategyId);
    if (badge) badge.innerHTML = '<span class="chip gray">error</span>';
  }
}

let _detailCache = {};

function toggleStrategyDetail(strategyId) {
  const row = document.getElementById('strategy-detail-'+strategyId);
  if (!row) return;
  const isOpen = row.classList.contains('open');
  if (isOpen) {
    row.classList.remove('open');
    return;
  }
  row.classList.add('open');
  // Load detail if not cached
  if (_detailCache[strategyId]) {
    document.getElementById('strategy-detail-content-'+strategyId).innerHTML = _detailCache[strategyId];
  } else {
    loadStrategyDetail(strategyId);
  }
}

async function loadStrategyDetail(strategyId) {
  const contentDiv = document.getElementById('strategy-detail-content-'+strategyId);
  if (!contentDiv) return;
  try {
    const data = await fetchJSON(API+'/dashboard/api/strategies/'+strategyId);
    let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
    // Left column: Backtest metrics
    html += '<div>';
    if (data.backtest) {
      const bt = data.backtest;
      html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin-bottom:6px">Backtest Results</h4>';
      html += '<div class="metric-row">';
      if (bt.sharpe != null) html += '<div class="metric"><div class="label">Sharpe</div><div class="val" style="font-size:14px;color:'+(bt.sharpe>=1?'#3fb950':'#d29922')+'">'+bt.sharpe.toFixed(2)+'</div></div>';
      if (bt.sortino != null) html += '<div class="metric"><div class="label">Sortino</div><div class="val" style="font-size:14px">'+bt.sortino.toFixed(2)+'</div></div>';
      if (bt.win_rate != null) html += '<div class="metric"><div class="label">Win Rate</div><div class="val" style="font-size:14px">'+(bt.win_rate*100).toFixed(0)+'%</div></div>';
      if (bt.total_trades != null) html += '<div class="metric"><div class="label">Total Trades</div><div class="val" style="font-size:14px">'+bt.total_trades+'</div></div>';
      if (bt.composite_fitness != null) html += '<div class="metric"><div class="label">Fitness</div>'+scoreBar(bt.composite_fitness*100,100)+'</div>';
      if (bt.expectancy != null) html += '<div class="metric"><div class="label">Expectancy</div><div class="val" style="font-size:14px;color:'+(bt.expectancy>=0?'#3fb950':'#f85149')+'">$'+bt.expectancy.toFixed(2)+'</div></div>';
      html += '</div>';
    } else {
      html += '<div class="sub">No backtest results</div>';
    }
    // Lifecycle events
    if (data.lifecycle_traces && data.lifecycle_traces.length) {
      html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin:8px 0 4px">Lifecycle</h4>';
      html += '<div style="font-size:12px;color:#8b949e">';
      for (const t of data.lifecycle_traces.slice(0,5)) {
        html += '<div>'+statusChip(t.stage)+' &rarr; '+statusChip(t.status)+' <span style="color:#484f58">'+fmtTime(t.created_at)+'</span></div>';
      }
      html += '</div>';
    }
    html += '</div>'; // end left

    // Right column: Validation reasons
    html += '<div>';
    html += '<h4 style="color:#8b949e;font-size:11px;text-transform:uppercase;margin-bottom:6px">Validation Checks</h4>';
    if (data.validation_reasons && data.validation_reasons.length) {
      for (const v of data.validation_reasons) {
        const icon = v.passed ? '&#10003;' : '&#10007;';
        const cls = v.passed ? 'val-pass' : 'val-fail';
        html += '<div style="margin-bottom:8px;padding:6px 8px;background:#161b22;border-radius:4px;border-left:3px solid '+(v.passed?'#3fb950':'#f85149')+'">';
        html += '<span class="'+cls+'">'+icon+'</span> <strong style="font-size:12px">'+v.check+'</strong>';
        html += '<div style="font-size:11px;color:#8b949e;margin-top:2px">'+esc(v.detail)+'</div>';
        html += '</div>';
      }
    } else {
      html += '<div class="sub">No validation data</div>';
    }
    // Strategy meta
    if (data.strategy) {
      const s = data.strategy;
      html += '<div style="font-size:11px;color:#484f58;margin-top:8px">';
      html += 'Trace: <code style="color:#8b949e">'+(s.trace_id||'--').slice(0,16)+'</code>';
      if (s.mutation_type) html += ' &middot; Mutation: '+s.mutation_type;
      if (s.lifecycle_state) html += ' &middot; State: '+s.lifecycle_state;
      html += '</div>';
    }
    html += '</div>'; // end right
    html += '</div>'; // end grid

    _detailCache[strategyId] = html;
    contentDiv.innerHTML = html;
  } catch(e) {
    contentDiv.innerHTML = '<div class="error-banner">Failed to load: '+esc(e.message)+'</div>';
  }
}

function renderValidationsList(data) {
  const { validations } = data;
  let html = '<div class="card"><h3>Detailed Validation Logs <span style="font-weight:400;color:#8b949e;font-size:11px">(recent attempts)</span></h3>';
  if (validations && validations.length) {
    html += '<div class="scroll-x"><table><tr><th>Time</th><th>Strategy</th><th>Status</th><th>Author</th><th>Rejection/Success Reason</th></tr>';
    for (const v of validations) {
      const rowStyle = v.status === 'validated' ? 'border-left: 3px solid #3fb950' : (v.status === 'failed_validation' ? 'border-left: 3px solid #f85149' : 'border-left: 3px solid #30363d');

  }
  if (mutation_policy) {
    html += '<div class="card flex-grow"><h3>Mutation Policy</h3>';
    html += '<div class="metric-row">';
    html += '<div class="metric"><div class="label">Observations</div><div class="val">'+(mutation_policy.n_observations||0)+'</div></div>';
    html += '</div></div>';
  }
  if (agent_governance) {
    html += '<div class="card flex-grow"><h3>Agent Governance</h3>';
    html += '<div class="metric-row">';
    html += '<div class="metric"><div class="label">Agents Assessed</div><div class="val">'+(agent_governance.n_agents_assessed||0)+'</div></div>';
    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('metaLearning').innerHTML = html;
}

function renderObservability(data) {
  const { metrics, anomalies } = data;
  let html = '<div class="flex">';
  if (metrics && metrics.metrics) {
    html += '<div class="card flex-grow"><h3>Monitoring Metrics</h3><table><tr><th>Time</th><th class="text-right">Counters</th></tr>';
    for (const m of metrics.metrics.slice(0, 10)) {
      const counters = Object.entries(m.counters||{}).map(([k,v]) => k+':'+v).join(', ');
      html += '<tr><td style="color:#8b949e;font-size:12px">'+fmtTime(m.recorded_at)+'</td><td style="font-size:12px;color:#8b949e">'+esc(counters.slice(0, 80))+'</td></tr>';
    }
    html += '</table></div>';
  }
  if (anomalies && anomalies.anomalies) {
    html += '<div class="card flex-grow"><h3>Anomaly Monitor</h3><table><tr><th>Time</th><th class="text-right">Anomalies</th><th>Severity</th></tr>';
    for (const a of anomalies.anomalies.slice(0, 10)) {
      html += '<tr><td style="color:#8b949e;font-size:12px">'+fmtTime(a.observed_at)+'</td><td class="text-right">'+a.n_anomalies+'</td><td>'+scoreBar((a.severity||0)*100, 100)+'</td></tr>';
    }
    html += '</table></div>';
  }
  html += '</div>';
  document.getElementById('observability').innerHTML = html;
}

function renderTrades(data) {
  const { total_trades, total_pnl, strategies_with_trades, trades } = data;
  let html = '<div class="grid">';
  html += '<div class="card"><h3>Total Trades</h3><div class="value">'+(total_trades||0)+'</div><div class="sub">all time</div></div>';
  html += '<div class="card"><h3>Total PnL</h3><div class="value" style="color:'+((total_pnl||0)>=0?'#3fb950':'#f85149')+'">$'+(total_pnl||0).toLocaleString(undefined,{minimumFractionDigits:2})+'</div><div class="sub">realized</div></div>';
  html += '<div class="card"><h3>Strategies Traded</h3><div class="value">'+(strategies_with_trades||0)+'</div><div class="sub">with paper trades</div></div>';
  html += '</div>';

  if (trades && trades.length) {
    html += '<div class="card mt-8"><h3>Recent Paper Trades <span style="font-weight:400;color:#8b949e;font-size:11px">(strategy-linked)</span></h3>';
    html += '<div class="scroll-x"><table><tr><th>Time</th><th>Strategy</th><th>Symbol</th><th>Side</th><th class="text-right">Qty</th><th class="text-right">Price</th><th>Status</th><th class="text-right">PnL</th></tr>';
    for (const t of trades) {
      const pnl = t.pnl != null ? parseFloat(t.pnl) : null;
      html += '<tr>'
        + '<td style="color:#8b949e;font-size:12px">'+fmtTime(t.time)+'</td>'
        + '<td style="font-size:12px">'+(t.strategy_name ? esc(t.strategy_name).slice(0,20) : '<span style="color:#484f58">Retired Strategy</span>')+'</td>'
        + '<td style="font-family:monospace">'+(t.symbol||'--')+'</td>'
        + '<td>'+statusChip(t.side||'--')+'</td>'
        + '<td class="text-right">'+(t.quantity||'--')+'</td>'
        + '<td class="text-right">'+(t.price > 0 ? '$'+parseFloat(t.price).toFixed(2) : (t.price === 0 ? '<span style="color:#484f58">Test Trade</span>' : '--'))+'</td>'
        + '<td>'+(t.status ? statusChip(t.status) : '<span class="chip gray">--</span>')+'</td>'
        + '<td class="text-right" style="color:'+(pnl !== null && pnl >= 0 ? '#3fb950' : '#f85149')+'">'+(pnl !== null && t.price > 0 ? '$'+pnl.toFixed(2) : (t.price === 0 ? 'N/A' : '--'))+'</td></tr>';
    }
    html += '</table></div></div>';
  } else {
    html += '<div class="card mt-8"><h3>Recent Trades</h3><div class="sub">No paper trades found</div></div>';
  }

  document.getElementById('trades').innerHTML = html;
}

function renderScouts(data) {
  const { internal, external } = data;
  let html = '';

  // ── Internal scouts ──
  html += '<div class=\"flex\">';
  html += '<div class=\"card flex-grow\"><h3>Internal Scout Sources</h3>';
  if (internal && internal.by_source && Object.keys(internal.by_source).length) {
    html += '<div class=\"sub\" style=\"margin-bottom:8px\">Total: ' + (internal.total_signals || 0) + ' signals</div>';
    html += '<table><tr><th>Source</th><th class=\"text-right\">Signals</th></tr>';
    for (const [k,v] of Object.entries(internal.by_source)) {
      html += '<tr><td>'+statusChip(k)+'</td><td class=\"text-right\">'+v+'</td></tr>';
    }
    html += '</table>';
  } else {
    html += '<div class=\"sub\">No internal scout signals yet</div>';
  }
  html += '</div>';

  html += '<div class=\"card flex-grow\"><h3>Recent Internal Signals</h3>';
  if (internal && internal.recent && internal.recent.length) {
    html += '<div class=\"scroll-x\"><table><tr><th>Source</th><th>Symbol</th><th>Type</th><th class=\"text-right\">Confidence</th></tr>';
    for (const s of internal.recent) {
      html += '<tr><td>'+statusChip(s.source)+'</td>'
        + '<td style=\"font-family:monospace\">'+(s.symbol||'--')+'</td>'
        + '<td><span class=\"tag\">'+(s.signal_type||'--')+'</span></td>'
        + '<td class=\"text-right\">'+(s.confidence||0).toFixed(2)+'</td></tr>';
    }
    html += '</table></div>';
  } else {
    html += '<div class=\"sub\">No internal signals yet</div>';
  }
  html += '</div></div>';

  // ── External scouts ──
  html += '<div class=\"flex mt-8\">';
  html += '<div class=\"card flex-grow\"><h3>External Scout Sources</h3>';
  if (external && external.by_source && Object.keys(external.by_source).length) {
    html += '<div class=\"sub\" style=\"margin-bottom:8px\">Total: ' + (external.total_signals || 0) + ' signals</div>';
    html += '<table><tr><th>Source</th><th class=\"text-right\">Signals</th></tr>';
    for (const [k,v] of Object.entries(external.by_source)) {
      html += '<tr><td>'+statusChip(k)+'</td><td class=\"text-right\">'+v+'</td></tr>';
    }
    html += '</table>';
  } else {
    html += '<div class=\"sub\">No external scout signals yet (scouts need to run)</div>';
  }
  html += '</div>';

  html += '<div class=\"card flex-grow\"><h3>Recent External Signals</h3>';
  if (external && external.recent && external.recent.length) {
    html += '<div class=\"scroll-x\"><table><tr><th>Source</th><th>Direction</th><th class=\"text-right\">Sentiment</th><th class=\"text-right\">Score</th></tr>';
    for (const s of external.recent) {
      html += '<tr><td>'+statusChip(s.source)+'</td>'
        + '<td>'+statusChip(s.direction)+'</td>'
        + '<td class=\"text-right\">'+(s.sentiment||0).toFixed(2)+'</td>'
        + '<td class=\"text-right\">'+(s.score||0).toFixed(2)+'</td></tr>';
    }
    html += '</table></div>';
  } else {
    html += '<div class=\"sub\">No external signals yet</div>';
  }
  html += '</div></div>';

  document.getElementById('scouts').innerHTML = html;
}

function esc(s) {
  if (typeof s !== 'string') s = String(s||'');
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(t) {
  if (!t) return '--';
  try { return new Date(t).toLocaleString(); } catch(_) { return t; }
}

async function refreshFastPanels() {
  try {
    const jobs = [
      fetchJSON(API+'/dashboard/api/overview').then(renderOverview).catch(err => setSectionError('overview', err.message)),
      fetchJSON(API+'/dashboard/api/pipeline').then(renderPipeline).catch(err => setSectionError('pipeline', err.message)),
      fetchJSON(API+'/dashboard/api/trades').then(renderTrades).catch(err => setSectionError('trades', err.message)),
      fetchJSON(API+'/dashboard/api/risk').then(renderRisk).catch(err => setSectionError('risk', err.message)),
      fetchJSON(API+'/dashboard/api/scouts').then(renderScouts).catch(err => setSectionError('scouts', err.message)),
      Promise.all([
        fetchJSON(API+'/dashboard/api/governance/system-health'),
        fetchJSON(API+'/dashboard/api/governance/event-store'),
        fetchJSON(API+'/dashboard/api/governance/audit'),
        fetchJSON(API+'/dashboard/api/governance/deployments'),
        fetchJSON(API+'/dashboard/api/governance/replay-integrity'),
      ]).then(([governanceHealth, eventStore, auditLedger, deployments, replayIntegrity]) => {
        renderGovernance({
          system_health: governanceHealth,
          event_store: eventStore,
          audit: auditLedger,
          deployments: deployments,
          replay_integrity: replayIntegrity,
        });
      }).catch(err => setSectionError('governance', err.message)),
    ];

    await Promise.allSettled(jobs);
    touchLastUpdate();
  } catch (err) {
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString()+' (error)';
    document.getElementById('errors').innerHTML = '<div class="error-banner">Failed to load dashboard: '+esc(err.message)+'</div>';
  }
}

async function refreshSlowPanels() {
  try {
    const jobs = [
      fetchJSON(API+'/dashboard/api/validations/list').then(renderValidationsList).catch(err => setSectionError('validationsList', err.message)),
      fetchJSON(API+'/dashboard/api/traces?limit=20').then(renderTraces).catch(err => setSectionError('traces', err.message)),
      fetchJSON(API+'/dashboard/api/patterns').then(renderPatterns).catch(err => setSectionError('patterns', err.message)),
      fetchJSON(API+'/dashboard/api/portfolio').then(renderPortfolio).catch(err => setSectionError('portfolio', err.message)),
      fetchJSON(API+'/dashboard/api/validation').then(renderValidation).catch(err => setSectionError('validation', err.message)),
      fetchJSON(API+'/dashboard/api/monitoring').then(renderMonitoring).catch(err => setSectionError('monitoring', err.message)),
      fetchJSON(API+'/dashboard/api/features').then(renderFeatures).catch(err => setSectionError('features', err.message)),
      fetchJSON(API+'/dashboard/api/execution/realism').then(renderExecutionRealism).catch(err => setSectionError('executionRealism', err.message)),
      Promise.all([
        fetchJSON(API+'/dashboard/api/risk/systemic'),
        fetchJSON(API+'/dashboard/api/risk/stress-test'),
        fetchJSON(API+'/dashboard/api/risk/capital-preservation'),
        fetchJSON(API+'/dashboard/api/portfolio/optimizer'),
      ]).then(([systemicRisk, stressTest, capPreserve, optimizer]) => {
        renderRiskPhase14({
          systemic: systemicRisk,
          stress_test: stressTest,
          capital_preservation: capPreserve,
          optimizer: optimizer,
        });
      }).catch(err => setSectionError('riskPhase14', err.message)),
      Promise.all([
        fetchJSON(API+'/dashboard/api/meta/prompts'),
        fetchJSON(API+'/dashboard/api/meta/mutation-policy'),
        fetchJSON(API+'/dashboard/api/meta/agent-governance'),
      ]).then(([prompts, mutationPolicy, agentGov]) => {
        renderMetaLearning({
          prompts: prompts,
          mutation_policy: mutationPolicy,
          agent_governance: agentGov,
        });
      }).catch(err => setSectionError('metaLearning', err.message)),
      Promise.all([
        fetchJSON(API+'/dashboard/api/observability/metrics'),
        fetchJSON(API+'/dashboard/api/observability/anomalies'),
      ]).then(([monitoringMetrics, anomalyData]) => {
        renderObservability({
          metrics: monitoringMetrics,
          anomalies: anomalyData,
        });
      }).catch(err => setSectionError('observability', err.message)),
    ];

    await Promise.allSettled(jobs);
    touchLastUpdate();
  } catch (err) {
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString()+' (error)';
    document.getElementById('errors').innerHTML = '<div class="error-banner">Failed to load dashboard: '+esc(err.message)+'</div>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('content').innerHTML = ''
    + '<div id="overview"></div>'
    + '<div class="section-title">Pipeline</div><div id="pipeline"></div>'
    + '<div class="section-title">Validation Details (Phase 30)</div><div id="validationsList"></div>'
    + '<div class="section-title">Lifecycle Traces</div><div id="traces"></div>'
    + '<div class="section-title">Pattern Intelligence</div><div id="patterns"></div>'
    + '<div class="section-title">Risk & CopyTrader</div><div id="risk"></div>'
    + '<div class="section-title">Paper Trades (Live)</div><div id="trades"></div>'
    + '<div class="section-title">Portfolio Intelligence (Phase 12)</div><div id="portfolio"></div>'
    + '<div class="section-title">Validation Analytics (Phase 11)</div><div id="validation"></div>'
    + '<div class="section-title">Drift & Retirement (Phase 12)</div><div id="monitoring"></div>'
    + '<div class="section-title">Feature Importance (Phase 11)</div><div id="features"></div>'
    + '<div class="section-title">Execution Realism (Phase 12)</div><div id="executionRealism"></div>'
    + '  <div class="section-title">Scout Network (Phase 12)</div><div id="scouts"></div>'
    + '<div class="section-title">Institutional Governance (Phase 13)</div><div id="governance"></div>'
    + '<div class="section-title">Risk & Capital Preservation (Phase 14)</div><div id="riskPhase14"></div>'
    + '<div class="section-title">Meta-Learning (Phase 15)</div><div id="metaLearning"></div>'
    + '<div class="section-title">Observability (Phase 17)</div><div id="observability"></div>'
    + '<div class="last-updated">Auto-refreshes every 30s</div>';
  setSectionHtml('overview', loadingCard('Loading overview...'));
  setSectionHtml('pipeline', loadingCard('Loading pipeline...'));
  setSectionHtml('validationsList', loadingCard('Loading validation logs...'));
  setSectionHtml('traces', loadingCard('Loading traces...'));
  setSectionHtml('patterns', loadingCard('Loading patterns...'));
  setSectionHtml('risk', loadingCard('Loading risk...'));
  setSectionHtml('trades', loadingCard('Loading trades...'));
  setSectionHtml('portfolio', loadingCard('Loading portfolio...'));
  setSectionHtml('validation', loadingCard('Loading validation...'));
  setSectionHtml('monitoring', loadingCard('Loading monitoring...'));
  setSectionHtml('features', loadingCard('Loading features...'));
  setSectionHtml('executionRealism', loadingCard('Loading execution realism...'));
  setSectionHtml('scouts', loadingCard('Loading scouts...'));
  setSectionHtml('governance', loadingCard('Loading governance...'));
  setSectionHtml('riskPhase14', loadingCard('Loading risk phase 14...'));
  setSectionHtml('metaLearning', loadingCard('Loading meta-learning...'));
  setSectionHtml('observability', loadingCard('Loading observability...'));
  document.getElementById('errors').innerHTML = '';
  document.getElementById('content').classList.remove('loading');
  refreshFastPanels();
  refreshSlowPanels();
  if (refreshTimer) clearInterval(refreshTimer);
  if (slowRefreshTimer) clearInterval(slowRefreshTimer);
  refreshTimer = setInterval(refreshFastPanels, FAST_REFRESH_MS);
  slowRefreshTimer = setInterval(refreshSlowPanels, SLOW_REFRESH_MS);
});
</script>
</body>
